name: Daily Reminder Email (reminders.json)

# ---------------------------------------------------------------------------
# Runs automatically every 30 minutes. Loads reminders.json (the "portal" —
# add/edit entries there, no code changes needed) and emails any reminder
# whose date is today AND whose reminderTime (UTC) falls in the current
# 30-minute window — so each reminder is sent close to its chosen time,
# accurate to within ~30 minutes. Separate from the fixed monthly medicine
# reminder in medicine-reminder.yml. Can also be run on-demand via
# workflow_dispatch.
#
# NOTE on GitHub Actions minutes: running every 30 minutes is ~48 runs/day
# (~1440/month). Public repos get unlimited free minutes; private repos on
# the Free plan get 2,000 free minutes/month. Each run typically takes under
# a minute, but GitHub bills whole minutes per job, so this can consume a
# meaningful share of a private repo's free quota. Increase the cron
# interval (e.g. "0,30 * * * *" -> "0 * * * *" for hourly) if you hit limits
# or don't need 30-minute precision.
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  send-daily-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Daily Reminder
        run: dotnet run --configuration Release --no-build -- --mode=daily
        env:
          EmailSettings__SmtpServer: smtp.gmail.com
          EmailSettings__SmtpPort: 587
          EmailSettings__EnableSsl: true
          EmailSettings__SenderEmail: ${{ secrets.SENDER_EMAIL }}
          EmailSettings__SenderPassword: ${{ secrets.GMAIL_APP_PASSWORD }}
          EmailSettings__ReceiverEmail: ${{ secrets.RECEIVER_EMAIL }}
